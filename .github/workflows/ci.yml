name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Restore lint cache
        uses: actions/cache@v4
        with:
          path: .cache/eslint
          key: ${{ runner.os }}-lint-cache-${{ hashFiles('package-lock.json', 'eslint.config.mjs', '.prettierrc.json') }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  nx-matrix:
    runs-on: ubuntu-latest
    outputs:
      target_matrix: ${{ steps.nx-targets.outputs.target_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Nx target matrix
        id: nx-targets
        run: |
          TEST_PROJECTS="$(npx nx show projects --with-target test)"

          TEST_PROJECTS="${TEST_PROJECTS}" node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs';

          const outputFile = process.env.GITHUB_OUTPUT;
          const testProjects = JSON.parse(process.env.TEST_PROJECTS);
          const include = testProjects.map((project) => ({ project, target: 'test' }));

          appendFileSync(outputFile, `target_matrix=${JSON.stringify({ include })}\n`);
          NODE

  generated-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/nx/cache
          key: ${{ runner.os }}-nx-generated-${{ hashFiles('package-lock.json', 'editor/package-lock.json', 'nx.json', '**/project.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-nx-generated-${{ hashFiles('package-lock.json', 'editor/package-lock.json', 'nx.json', '**/project.json') }}-
            ${{ runner.os }}-nx-generated-
            ${{ runner.os }}-nx-

      - name: Build generated Avrae files
        run: npx nx run-many -t build --projects=avrae-sourcemaps,avrae-gvar-utils-catalogues,avrae-gvar-configs --parallel=3

      - name: Upload generated Avrae artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-avrae
          if-no-files-found: error
          path: |
            .varfile.json
            src/gvars/env.dev.gvar
            src/gvars/env.prod.gvar
            src/gvars/configs/books/*.gvar.json
            src/gvars/configs/recipes/*.gvar.json
            src/gvars/utils/catalogues/**/*.gvar.json

  nx-test:
    name: nx ${{ matrix.project }}:${{ matrix.target }}
    runs-on: ubuntu-latest
    needs:
      - nx-matrix
      - generated-build
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.nx-matrix.outputs.target_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            editor/package-lock.json

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/nx/cache
          key: ${{ runner.os }}-nx-${{ matrix.project }}-${{ matrix.target }}-${{ hashFiles('package-lock.json', 'editor/package-lock.json', 'nx.json', '**/project.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ matrix.project }}-${{ matrix.target }}-${{ hashFiles('package-lock.json', 'editor/package-lock.json', 'nx.json', '**/project.json') }}-
            ${{ runner.os }}-nx-${{ matrix.project }}-${{ matrix.target }}-
            ${{ runner.os }}-nx-

      - name: Install dependencies
        run: npm ci

      - name: Download generated Avrae artifact
        uses: actions/download-artifact@v5
        with:
          name: generated-avrae

      - name: Install editor dependencies
        if: matrix.project == 'editor'
        run: npm --prefix editor ci

      - name: Install uv
        if: startsWith(matrix.project, 'avrae-gvar') || startsWith(matrix.project, 'avrae-aliases')
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.9.26'

      - name: Install avrae-ls
        if: startsWith(matrix.project, 'avrae-gvar') || startsWith(matrix.project, 'avrae-aliases')
        run: uv tool install avrae-ls

      - name: Run Nx target
        env:
          AVRAE_TOKEN: ${{ secrets.AVRAE_TOKEN }}
        run: |
          if [ "${{ matrix.project }}" = "editor" ]; then
            npx nx run ${{ matrix.project }}:${{ matrix.target }}
          else
            npx nx run ${{ matrix.project }}:${{ matrix.target }} --excludeTaskDependencies
          fi

  version:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version-check.outputs.package_version }}
      development_version: ${{ steps.version-check.outputs.development_version }}
      production_version: ${{ steps.version-check.outputs.production_version }}
      should_deploy_production: ${{ steps.version-check.outputs.should_deploy_production }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check deployed versions
        id: version-check
        env:
          AVRAE_TOKEN: ${{ secrets.AVRAE_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs';
          import { createRequire } from 'node:module';

          const require = createRequire(import.meta.url);
          const { getGvar } = require('publish-avrae');

          const packageJson = JSON.parse(readFileSync('package.json', 'utf8'));
          const localVersion = packageJson.version;
          const githubOutput = process.env.GITHUB_OUTPUT;

          function setOutput(name, value) {
            if (githubOutput) {
              appendFileSync(githubOutput, `${name}=${value}\n`);
            }
          }

          function parseVersion(version) {
            const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(version);

            if (!match) {
              throw new Error(`Expected a MAJOR.MINOR.PATCH version, got ${version}`);
            }

            return match.slice(1).map(Number);
          }

          function compareVersions(a, b) {
            for (let index = 0; index < a.length; index += 1) {
              if (a[index] !== b[index]) {
                return a[index] - b[index];
              }
            }

            return 0;
          }

          function loadSourceMap(filePath) {
            return JSON.parse(readFileSync(filePath, 'utf8'));
          }

          function environmentGvarId(sourceMap) {
            return (
              sourceMap.workshop?.environment ||
              sourceMap.gvars?.find(({ name }) => name === 'env')?.id
            );
          }

          function parseEnvVersion(environment, value) {
            const match = /^version\s*=\s*["']([^"']+)["']/im.exec(value || '');

            if (!match) {
              console.log(`${environment} env gvar does not declare version; treating it as 0.0.0.`);
              return '0.0.0';
            }

            return match[1];
          }

          async function getDeployedVersion(environment, sourceMapFile) {
            const sourceMap = loadSourceMap(sourceMapFile);
            const gvarId = environmentGvarId(sourceMap);

            if (!gvarId) {
              throw new Error(`${environment} sourcemap does not define an env gvar id.`);
            }

            const gvar = await getGvar(gvarId);
            return parseEnvVersion(environment, gvar?.value);
          }

          const local = parseVersion(localVersion);
          const developmentVersion = await getDeployedVersion(
            'Development',
            'utils/sourcemap.dev.json',
          );
          const productionVersion = await getDeployedVersion(
            'Production',
            'utils/sourcemap.prod.json',
          );
          const production = parseVersion(productionVersion);
          const productionComparison = compareVersions(local, production);

          if (productionComparison < 0) {
            setOutput('should_deploy_production', 'false');
            throw new Error(
              `${packageJson.name}@${localVersion} is lower than the deployed production version, ${productionVersion}.`,
            );
          }

          const shouldDeployProduction = productionComparison > 0;

          console.log(`package.json version: ${localVersion}`);
          console.log(`deployed development version: ${developmentVersion}`);
          console.log(`deployed production version: ${productionVersion}`);
          console.log(`deploy production: ${shouldDeployProduction}`);

          setOutput('package_version', localVersion);
          setOutput('development_version', developmentVersion);
          setOutput('production_version', productionVersion);
          setOutput('should_deploy_production', String(shouldDeployProduction));
          NODE

  deploy-dev:
    runs-on: ubuntu-latest
    needs:
      - lint
      - nx-test
      - generated-build
      - version

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download generated Avrae artifact
        uses: actions/download-artifact@v5
        with:
          name: generated-avrae

      - name: Deploy development
        run: npx nx run avrae-sourcemaps:deploy-dev
        env:
          AVRAE_TOKEN: ${{ secrets.AVRAE_TOKEN }}

  deploy-prod:
    runs-on: ubuntu-latest
    if: needs.version.outputs.should_deploy_production == 'true'
    needs:
      - lint
      - nx-test
      - generated-build
      - version
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.pages-deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            editor/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix editor ci

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/nx/cache
          key: ${{ runner.os }}-nx-deploy-prod-${{ hashFiles('package-lock.json', 'editor/package-lock.json', 'nx.json', '**/project.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-nx-deploy-prod-${{ hashFiles('package-lock.json', 'editor/package-lock.json', 'nx.json', '**/project.json') }}-
            ${{ runner.os }}-nx-deploy-prod-
            ${{ runner.os }}-nx-

      - name: Download generated Avrae artifact
        uses: actions/download-artifact@v5
        with:
          name: generated-avrae

      - name: Deploy production
        run: npx nx run avrae-sourcemaps:deploy-prod
        env:
          AVRAE_TOKEN: ${{ secrets.AVRAE_TOKEN }}

      - name: Build editor
        run: npx nx run editor:build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload editor artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy editor to GitHub Pages
        id: pages-deployment
        uses: actions/deploy-pages@v4

      - name: Tag production version
        env:
          PACKAGE_VERSION: ${{ needs.version.outputs.package_version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${PACKAGE_VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag ${PACKAGE_VERSION} already exists."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${PACKAGE_VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${PACKAGE_VERSION}"

      - name: Create GitHub release when notes exist
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.version.outputs.package_version }}
        run: |
          RELEASE_NOTES="docs/internal/releases/${PACKAGE_VERSION}.md"

          if [ ! -f "${RELEASE_NOTES}" ]; then
            echo "No release notes at ${RELEASE_NOTES}; skipping GitHub release."
            exit 0
          fi

          if gh release view "${PACKAGE_VERSION}" >/dev/null 2>&1; then
            echo "GitHub release ${PACKAGE_VERSION} already exists; skipping."
            exit 0
          fi

          gh release create "${PACKAGE_VERSION}" \
            --verify-tag \
            --title "westmarch-generic ${PACKAGE_VERSION}" \
            --notes-file "${RELEASE_NOTES}"
